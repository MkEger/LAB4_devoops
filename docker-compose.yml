version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  communication-control:
    build: ./src/CommunicationControl
    container_name: communication-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - RedisHost=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  map-client:
    build: ./src/MapClient
    container_name: map-client-nginx
    ports:
      - "80:80"
    depends_on:
      - communication-control
    networks:
      - app-network
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://communication-control:8080

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge









